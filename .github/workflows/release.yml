name: Build project binaries

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: install cross targets
        run: rustup target add x86_64-unknown-linux-musl
      - name: build
        run: cargo build --release --target=x86_64-unknown-linux-gnu --target=x86_64-unknown-linux-musl
      - name: copy bins
        run: |
          mkdir artifacts
          cp target/x86_64-unknown-linux-gnu/release/leaves artifacts/leaves-x86_64-linux-glibc
          cp target/x86_64-unknown-linux-musl/release/leaves artifacts/leaves-x86_64-linux-musl

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: leaves-linux
          path: artifacts
  release:
    if: github.ref_type == 'tag'
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: leaves-linux
      - run: |
          ls -la
          mv leaves-x86_64-linux-glibc leaves-${{  github.ref_name }}-x86_64-linux
          mv leaves-x86_64-linux-musl leaves-${{  github.ref_name }}-x86_64-linux-musl
      - name: Create a draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            leaves-${{  github.ref_name }}-x86_64-linux
            leaves-${{  github.ref_name }}-x86_64-linux-musl
